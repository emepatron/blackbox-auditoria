name: Auditoria de CRM
code: crm
description: "Squad que conduz a auditoria de CRM e funil comercial (estrutura, qualidade de dados, conversão, velocidade de resposta, cadência e gestão). O analista de CRM orquestra; as skills por ponto fazem o trabalho e preenchem a planilha-gabarito."
icon: "🗂️"
version: "1.0.0"

agents:
  - agents/analista-crm.agent.md

skills:
  - crm-coletar
  - crm-funil
  - crm-qualidade
  - crm-cadencia
  - crm-preencher

gabarito: "planilhas/Auditoria de CRM - V4.xlsx"

como_funciona: |
  1. O analista lê o dossiê (auditorias/<cliente>/00-dossie.md), confirma qual CRM o cliente usa e o ciclo de venda típico.
  2. Garante os dados (export de oportunidades/funil) via skill crm-coletar.
  3. Audita a planilha por seção, acionando as skills por ponto:
     - 1.1 Estrutura e configuração → o analista conduz direto.
     - 1.2 Qualidade dos dados → crm-qualidade.
     - 1.3 Funil e conversão → crm-funil.
     - 1.4 Velocidade e cadência → crm-cadencia.
     - 1.5 Gestão e integração → o analista conduz direto.
  4. A skill crm-preencher consolida os achados na planilha e em achados/crm.md.
  5. O analista sintetiza e devolve o controle para a skill iniciar (próxima frente ou relatório).
